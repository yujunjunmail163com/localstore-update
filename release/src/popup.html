<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Storage Manager</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="iconfont.css" />
</head>

<body>
  <div class="app">

    <!-- ========== 顶部信息栏 ========== -->
    <header class="header">
      <div class="header-left">
        <img src="logo.png" alt="logo" class="header-logo" />
        <span class="header-title">Eclin localstorage manager</span>
      </div>
      <div class="header-right">
        <img id="tabFavicon" class="header-favicon" src="" alt="" style="display:none;" />
        <span id="tabDomain" class="header-domain"></span>
        <button id="closePanel" class="btn-icon" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ========== 快速添加区 ========== -->
    <section class="add-section">
      <div class="add-section-inner">
        <input type="text" id="quickKey" class="form-input" placeholder="输入 Key" />
        <input type="text" id="quickValue" class="form-input" placeholder="输入 Value" />
        <button id="quickAddBtn" class="btn btn-primary">添加</button>
      </div>
    </section>

    <!-- ========== 数据管理区 ========== -->
    <section class="management-section">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="searchInput" placeholder="搜索 Key..." class="search-input" />
        </div>
        <button id="refreshBtn" class="btn btn-primary">初始化</button>
        <button id="jumpBtn" class="btn btn-secondary">快速跳转</button>
        <a href="https://github.com/yujunjunmail163com/Localstorage-Manager" target="_blank" class="github-link">
          <svg height="24" viewBox="0 0 16 16" version="1.1" width="24" aria-hidden="true">
            <path fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
            </path>
          </svg>
        </a>
      </div>

      <!-- 数据表格 -->
      <div class="table-wrapper">
        <div class="table-container" id="tableContainer">
          <table class="storage-table" id="storageTable">
            <thead>
              <tr>
                <th class="col-index">#</th>
                <th class="col-key">Key</th>
                <th class="col-value">Value</th>
                <th class="col-actions"></th>
              </tr>
            </thead>
            <tbody id="storageBody">
            </tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
          <p>暂无 localStorage 数据</p>
        </div>
      </div>
    </section>

    <!-- ========== 删除确认弹窗 ========== -->
    <div id="confirmModal" class="modal confirm-modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">提示</span>
          <button id="confirmClose" class="btn-close" aria-label="关闭">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <p class="confirm-message">
            确定删除：【<span id="confirmKey"></span>】吗？
          </p>
        </div>
        <div class="modal-footer">
          <button id="confirmCancel" class="btn btn-secondary">取消</button>
          <button id="confirmOk" class="btn btn-primary">确定</button>
        </div>
      </div>
    </div>

    <!-- ========== 快速跳转弹窗 ========== -->
    <div id="jumpModal" class="modal confirm-modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">快速跳转</span>
        </div>
        <div class="modal-body">
          <ul class="jump-list" id="jumpList"></ul>
        </div>
      </div>
    </div>

  </div>

  <script src="storage-manager.js"></script>
  <script src="inline-editor.js"></script>
  <script src="popup.js"></script>
</body>

</html>
