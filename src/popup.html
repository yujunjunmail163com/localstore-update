<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Storage Manager</title>
  <link rel="stylesheet" href="styles.css">

  <!-- iconfont 图标字体（本地引入，避免 Chrome 扩展协议问题） -->
  <link rel="stylesheet" href="iconfont.css" />


</head>

<body>
  <div class="app">

    <!-- ========== 顶部标题栏 ========== -->
    <header class="header">
      <h1>Eclin localstorage manager</h1>
      <div class="header-actions">
        <!-- 药丸形搜索框（带 SVG 搜索图标） -->
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="searchInput" placeholder="搜索 Key..." class="search-input">
        </div>
        <button id="addBtn" class="btn btn-primary">新增</button>
        <button id="refreshBtn" class="btn btn-secondary">刷新</button>
      </div>
    </header>

    <!-- ========== 数据表格区 ========== -->
    <div class="table-container" id="tableContainer">
      <table class="storage-table" id="storageTable">
        <thead>
          <tr>
            <th class="col-index">#</th>
            <th class="col-key">Key</th>
            <th class="col-value">Value</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="storageBody">
          <!-- 由 popup.js 动态渲染 -->
        </tbody>
      </table>
    </div>

    <!-- 空状态提示（无数据或加载失败时显示） -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <p>暂无 localStorage 数据</p>
    </div>

    <!-- ========== 删除确认弹窗（Header / Body / Footer 结构） ========== -->
    <div id="confirmModal" class="modal confirm-modal" style="display:none;">
      <div class="modal-content">
        <!-- 头部：标题 + 关闭按钮 -->
        <div class="modal-header">
          <h3>确认删除</h3>
          <button id="confirmClose" class="btn-close" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-divider"></div>
        <!-- 主体：提示内容 -->
        <div class="modal-body">
          <p class="confirm-message" id="confirmMessage"></p>
        </div>
        <!-- 底部：操作按钮 -->
        <div class="modal-footer">
          <button id="confirmCancel" class="btn btn-secondary">取消</button>
          <button id="confirmOk" class="btn btn-primary">删除</button>
        </div>
      </div>
    </div>

    <!-- ========== 新增数据弹窗 ========== -->
    <div id="addModal" class="modal" style="display:none;">
      <div class="modal-content">
        <h3>新增数据</h3>
        <div class="form-group">
          <label>Key</label>
          <input type="text" id="newKey" class="form-input" placeholder="输入 Key">
        </div>
        <div class="form-group">
          <label>Value</label>
          <textarea id="newValue" class="form-input" rows="3" placeholder="输入 Value"></textarea>
        </div>
        <div class="modal-actions">
          <button id="cancelAdd" class="btn btn-secondary">取消</button>
          <button id="confirmAdd" class="btn btn-primary">确定</button>
        </div>
      </div>
    </div>

  </div>

  <!-- JS 模块加载顺序：数据层 → 编辑层 → 主控制器 -->
  <script src="storage-manager.js"></script>
  <script src="inline-editor.js"></script>
  <script src="popup.js"></script>
</body>

</html>
